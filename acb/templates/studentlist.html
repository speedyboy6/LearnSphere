{% extends 'adminhome.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f4f4f4;
        }
        .delete-button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }
        .delete-button:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

<h1>Student List</h1><br>

<table id="studentTable">
    <thead>
        <tr>
            <th>Firstname</th>
            <th>LastName</th>
            <th>RollNumber</th>
            <th>DOB</th>
            <th>Email</th>
            <th>Image</th>
            <th>Delete</th>
            
        </tr>
    </thead>
    <tbody>
        {% for i in data %}
        <td>{{i.Firstname}}</td>
        <td>{{i.Lastname}}</td>
        <td>{{i.RollNumber}}</td>
        <td>{{i.DOB}}</td>
        <td>{{i.Email}}</td>
        <td><img src="/media/{{i.Image}}" style="height: 100px; width: 100px;"></td>
        <td><a href="/student_delete/{{ i.id }}">Delete</td></a>
        
    </tbody>
    {% endfor %}
</table>
