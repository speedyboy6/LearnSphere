<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #6e44ff, #b892ff);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 500px;
        }
        .form-select, .form-control {
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        .form-select option {
            background-color: #6e44ff;
            color: #fff;
        }
        .form-control:focus, .form-select:focus {
            background-color: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(255, 255, 255, 0.1);
        }
        .btn-light {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            transition: all 0.3s ease;
        }
        .btn-light:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .title-icon {
            font-size: 2rem;
            margin-bottom: 20px;
        }
        .form-label i {
            margin-right: 8px;
        }
        .input-group-text {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" style="color: black;" class="mb-4 inline-block">Back</a>

        <div class="text-center mb-4">
            <i class="bi bi-person-check-fill title-icon"></i>
            <h2>Mark Attendance</h2>
        </div>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">
                    <i class="bi bi-person-badge"></i>Roll Number:
                </label>
                <select name="rollnumber" class="form-select" required>
                    {% for student in students %}
                        <option value="{{ student.RollNumber }}">{{ student.RollNumber }} - {{ student.Firstname }} {{ student.Lastname }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">
                    <i class="bi bi-calendar-date"></i>Date:
                </label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-calendar3"></i>
                    </span>
                    <input type="date" name="date" class="form-control" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">
                    <i class="bi bi-check-circle"></i>Status:
                </label>
                <select name="status" class="form-select" required>
                    <option value="Present">
                        <i class="bi bi-check-circle-fill"></i> Present
                    </option>
                    <option value="Absent">
                        <i class="bi bi-x-circle-fill"></i> Absent
                    </option>
                </select>
            </div>
            <button type="submit" class="btn btn-light w-100">
                <i class="bi bi-save2"></i> Mark Attendance
            </button>
        </form>
    </div>
</body>
</html>
